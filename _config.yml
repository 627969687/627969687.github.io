# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: 404博客            # 站点标题
subtitle:                # 站点副标题
description:             # 站点描述
author: 404NotFound      # 作者
language: zh-Hans        # 语言
timezone:                # 时区
avatar:                  # 头像

# URL
## If your site is put in a subdirectory, set url as 'http://yoursite.com/child' and root as '/child/'
url: http://www.404not.cn/
root: /
# permalink: :year/:month/:day/:title/
permalink: :title.html
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :year-:month-:day-:title.md # File name of new posts 设置文章的文件名
default_layout: post
titlecase: false # Transform title into titlecase
external_link: true # Open external links in new tab
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: true     # 代码高亮
  tab_replace:
  
# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 5
  order_by: -date

archive_generator:
  per_page: 20
  yearly: true
  monthly: true

tag_generator:
  per_page: 10

  
# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: next     # 主题

# Deployment
## Docs: https://hexo.io/docs/deployment.html
# 部署站点
deploy: 
  type: git
  repo: 
    # gitee: https://gitee.com/Tk_Jacky/Tk_Jacky.git
    coding: https://git.coding.net/Tk_Jacky/Tk_Jacky.coding.me.git
    github: https://github.com/627969687/627969687.github.io.git
  branch: master
  # https://github.com/627969687/627969687.github.io.git    # github
  # https://gitee.com/Tk_Jacky/Tk_Jacky.git                 # 码云
# 本地搜索插件
search:
  path: search.xml
  field: post
  format: html
  limit: 10000
